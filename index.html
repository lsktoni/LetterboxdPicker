<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letterboxd Picker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ece4;
    --muted: #555;
    --muted2: #888;
    --accent: #e8c468;
    --red: #e05c5c;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }
  .container { width: 100%; max-width: 460px; }

  .eyebrow { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 2.6rem; line-height: 1.1; font-weight: 400; margin-bottom: 2.5rem; }
  h1 em { font-style: italic; color: var(--accent); }

  /* Input row */
  .input-row {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .input-row:focus-within { border-color: var(--border-hover); }
  .input-prefix {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 0 12px;
    display: flex;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    user-select: none;
  }
  input[type="text"], input[type="number"] {
    background: var(--surface);
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 13px 14px;
    flex: 1;
    width: 0;
  }
  input[type="text"]::placeholder,
  input[type="number"]::placeholder { color: var(--muted); }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button { display: none; }

  /* Filters section */
  .filters-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 1rem;
    user-select: none;
    width: fit-content;
  }
  .filters-toggle:hover { color: var(--text); }
  .filters-toggle .arrow {
    display: inline-block;
    transition: transform 0.2s;
    font-style: normal;
    font-size: 10px;
  }
  .filters-toggle.open .arrow { transform: rotate(90deg); }

  .filters-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem;
    margin-bottom: 1rem;
    gap: 0.75rem;
    flex-direction: column;
  }
  .filters-panel.open { display: flex; }

  .filter-row { display: flex; gap: 8px; align-items: center; }
  .filter-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    width: 58px;
    flex-shrink: 0;
  }

  .filter-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    flex: 1;
    outline: none;
    transition: border-color 0.15s;
    width: 0;
  }
  .filter-input:focus { border-color: var(--border-hover); }
  .filter-input::placeholder { color: var(--muted); }
  .filter-input[type="number"] { -moz-appearance: textfield; }
  .filter-input[type="number"]::-webkit-inner-spin-button { display: none; }

  .filter-sep {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* Toggle switch */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 2px;
  }
  .toggle-row .filter-label { width: 58px; }
  .switch {
    position: relative;
    width: 34px;
    height: 18px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    left: 3px;
    top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .switch input:checked + .slider { background: var(--accent-dim, rgba(232,196,104,0.15)); border-color: rgba(232,196,104,0.4); }
  .switch input:checked + .slider::before { transform: translateX(16px); background: var(--accent); }
  .toggle-desc { font-size: 11px; color: var(--muted2); }

  /* Pick button */
  button#pick-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button#pick-btn:hover { opacity: 0.88; }
  button#pick-btn:active { transform: scale(0.99); }
  button#pick-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 0.9rem;
    font-size: 11px;
    color: var(--muted);
    min-height: 16px;
    text-align: center;
  }
  .status.error { color: var(--red); }
  .status.loading { color: var(--accent); }

  /* Result */
  .result { margin-top: 2.5rem; display: none; animation: fadeUp 0.4s ease forwards; }
  .result.visible { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .poster-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    max-height: 460px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 1.1rem;
  }
  .poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  }
  .poster-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 1.25rem;
  }
  .movie-title { font-family: 'DM Serif Display', serif; font-size: 1.65rem; line-height: 1.15; color: #fff; }
  .movie-meta { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 5px; letter-spacing: 0.1em; }
  .genre-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .genre-tag {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
    padding: 3px 8px; border-radius: 2px;
  }

  .result-actions { display: flex; gap: 10px; }
  .btn-ghost {
    flex: 1; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-ghost:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.04); }

  .count-badge { font-size: 10px; color: var(--muted); text-align: center; margin-top: 1rem; }
  .count-badge span { color: var(--accent); }

  .spinner {
    display: inline-block; width: 11px; height: 11px;
    border: 1.5px solid rgba(10,10,10,0.3); border-top-color: #0a0a0a;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">Letterboxd</div>
  <h1>What should<br>I <em>watch?</em></h1>

  <div class="input-row">
    <span class="input-prefix">letterboxd.com /</span>
    <input type="text" id="username" placeholder="username" autocomplete="off" spellcheck="false" />
  </div>

  <div class="filters-toggle" id="filters-toggle" onclick="toggleFilters()">
    <span class="arrow">▶</span> Filters
  </div>

  <div class="filters-panel" id="filters-panel">
    <div class="filter-row">
      <span class="filter-label">Genre</span>
      <input class="filter-input" type="text" id="genre" placeholder="e.g. horror, comedy…" />
    </div>
    <div class="filter-row">
      <span class="filter-label">Year</span>
      <input class="filter-input" type="number" id="year-min" placeholder="from" min="1900" max="2099" />
      <span class="filter-sep">—</span>
      <input class="filter-input" type="number" id="year-max" placeholder="to" min="1900" max="2099" />
    </div>
    <div class="filter-row">
      <span class="filter-label">Runtime</span>
      <input class="filter-input" type="number" id="runtime-max" placeholder="max mins" min="1" />
    </div>
    <div class="filter-row toggle-row">
      <span class="filter-label">Watched</span>
      <label class="switch">
        <input type="checkbox" id="exclude-watched" />
        <span class="slider"></span>
      </label>
      <span class="toggle-desc">Skip already-watched films</span>
    </div>
  </div>

  <button id="pick-btn" onclick="pickMovie()">Pick a film</button>
  <p class="status" id="status"></p>

  <div class="result" id="result">
    <div class="poster-wrap">
      <div class="poster-placeholder" id="poster-placeholder">No poster available</div>
      <img id="poster-img" src="" alt="" style="display:none;" />
      <div class="poster-overlay">
        <div class="movie-title" id="movie-title"></div>
        <div class="movie-meta" id="movie-meta"></div>
        <div class="genre-tags" id="genre-tags"></div>
      </div>
    </div>
    <div class="result-actions">
      <a class="btn-ghost" id="letterboxd-link" href="#" target="_blank">↗ Letterboxd</a>
      <button class="btn-ghost" onclick="pickMovie()">↻ Pick again</button>
    </div>
    <p class="count-badge" id="count-badge"></p>
  </div>
</div>

<script>
  const API = 'http://localhost:5000';

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch(`${API}/api/last-username`);
      const d = await res.json();
      if (d.username) document.getElementById('username').value = d.username;
    } catch(e) {}
  });

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') pickMovie();
  });

  function toggleFilters() {
    const toggle = document.getElementById('filters-toggle');
    const panel  = document.getElementById('filters-panel');
    toggle.classList.toggle('open');
    panel.classList.toggle('open');
  }

  async function pickMovie() {
    const username = document.getElementById('username').value.trim();
    if (!username) { setStatus('Enter a username', 'error'); return; }

    const btn = document.getElementById('pick-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Fetching…';
    setStatus('This may take a moment…', 'loading');
    document.getElementById('result').classList.remove('visible');

    const payload = {
      username,
      genre:           document.getElementById('genre').value.trim(),
      year_min:        document.getElementById('year-min').value || null,
      year_max:        document.getElementById('year-max').value || null,
      runtime_max:     document.getElementById('runtime-max').value || null,
      exclude_watched: document.getElementById('exclude-watched').checked,
    };

    try {
      const res  = await fetch(`${API}/api/pick`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) { setStatus(data.error || 'Something went wrong', 'error'); return; }
      showResult(data);
      setStatus('');
    } catch(e) {
      setStatus('Cannot connect — is server.py running?', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Pick a film';
    }
  }

  function showResult(data) {
    document.getElementById('movie-title').textContent = data.title;

    const parts = [];
    if (data.year) parts.push(data.year);
    if (data.runtime) parts.push(`${data.runtime} min`);
    document.getElementById('movie-meta').textContent = parts.join(' · ');

    const tagsEl = document.getElementById('genre-tags');
    tagsEl.innerHTML = (data.genres || []).map(g => `<span class="genre-tag">${g}</span>`).join('');

    document.getElementById('letterboxd-link').href = data.url;

    const img = document.getElementById('poster-img');
    const ph  = document.getElementById('poster-placeholder');
    if (data.poster) {
      img.src = data.poster; img.style.display = 'block'; ph.style.display = 'none';
    } else {
      img.style.display = 'none'; ph.style.display = 'flex';
    }

    let badge = `Picked from <span>${data.filtered}</span> films`;
    if (data.filtered !== data.total) badge += ` (of ${data.total} total)`;
    document.getElementById('count-badge').innerHTML = badge;

    const r = document.getElementById('result');
    r.classList.remove('visible');
    void r.offsetWidth;
    r.classList.add('visible');
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }
</script>
</body>
</html>
